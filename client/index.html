<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>JABV Labs | Custom Apps, Websites, and Redesigns</title>
    <meta
      name="description"
      content="JABV Labs builds custom mobile apps, interactive websites, and website redesigns for businesses that need a sharper digital product experience."
    />
    <meta property="og:title" content="JABV Labs | Custom Apps, Websites, and Redesigns" />
    <meta
      property="og:description"
      content="Custom digital products for teams that need more clarity, credibility, and long-term maintainability."
    />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#120f0f" />
  </head>
  <body>
    <script>
      new MutationObserver(function (m, o) {
        m.forEach(function (r) {
          r.addedNodes.forEach(function (n) {
            if (n.tagName === "VITE-ERROR-OVERLAY") n.remove();
          });
        });
        setTimeout(function () {
          o.disconnect();
        }, 8000);
      }).observe(document.body, { childList: true });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
